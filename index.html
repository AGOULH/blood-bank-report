<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Blood Bank Dammam — Year-over-Year Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;800;900&family=Inter:wght@500;600;700;800;900&display=swap');
  :root{
    --green:#00754A;
    --gold:#B7A57A;
    --gold-light:#F1EEE3;
    --ink:#1c2220;
    --muted:#8a918c;
    --card-border:#e6e8e6;
    --waste:#17DFCF;    --waste-track:#d7f8f4;
    --rhneg:#24C8D8;    --rhneg-track:#d3f0f4;
    --female:#2FB4DE;   --female-track:#d6ecf7;
    --donor:#3E9FE0;    --donor-track:#dae9f8;
    --red:#E31B0C;
    --icon-ink:#123a35;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  *,*::before,*::after{
    -webkit-print-color-adjust:exact !important;
    print-color-adjust:exact !important;
    color-adjust:exact !important;
  }
  body{
    font-family:'Inter','Segoe UI',Arial,sans-serif;
    background:#e9ece9;
    color:var(--ink);
    padding:26px 14px 70px;
  }
  .sheet{
    max-width:1180px;margin:0 auto;background:#fff;border-radius:18px;
    box-shadow:0 24px 64px rgba(0,50,30,0.12); overflow:hidden;
  }

  /* ================= HEADER — logo only, rest plain white ================= */
  .header{position:relative;padding:24px 0 18px;background:#fff;min-height:150px;border-bottom:1px solid var(--card-border);}
  .brand{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:230px;margin-left:34px;text-align:center;}
  .brand img{height:70px;margin-bottom:6px;}
  .brand-ar{font-family:'Cairo',sans-serif;font-size:22px;font-weight:800;color:var(--green);line-height:1.25;}
  .brand-en{font-size:13.5px;letter-spacing:.6px;color:var(--gold);font-weight:700;margin-top:1px;}
  .brand-sub{font-family:'Cairo',sans-serif;font-size:13px;color:var(--green);font-weight:800;border-top:1.5px solid var(--green);padding-top:5px;margin-top:6px;width:100%;}
  [contenteditable]{outline:none;border-radius:4px;}
  [contenteditable]:hover{background:#eef7f1;cursor:text;}
  [contenteditable]:focus{background:#fff6da;box-shadow:0 0 0 2px var(--gold);}

  /* ================= toolbar ================= */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:center;padding:14px 20px;background:var(--gold-light);border-bottom:1px solid var(--card-border);}
  .toolbar button{font-family:inherit;font-size:13px;font-weight:700;border:1px solid var(--green);background:#fff;color:var(--green);padding:8px 16px;border-radius:20px;cursor:pointer;transition:.15s;}
  .toolbar button:hover{background:var(--green);color:#fff;}
  .toolbar button.danger{border-color:var(--red);color:var(--red);}
  .toolbar button.danger:hover{background:var(--red);color:#fff;}
  .toolbar .hint{font-size:12px;color:var(--muted);width:100%;text-align:center;margin-top:-4px;}

  /* ================= section ================= */
  .section{padding:26px 24px 6px;}
  .section + .section{border-top:1px dashed var(--card-border);}
  .section-title{text-align:center;font-size:19px;font-weight:800;letter-spacing:1px;margin:4px 0 18px;color:var(--ink);}
  .section-title [contenteditable]{display:inline-block;padding:3px 18px;border-radius:16px;background:#f4f5f4;}

  .yearrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:start;gap:8px;}
  .yearcol{display:flex;flex-direction:column;align-items:center;}
  .yearlabel{font-size:16px;font-weight:800;color:#9aa39d;margin-bottom:14px;letter-spacing:2px;font-variant-numeric:tabular-nums;}
  .yearlabel[contenteditable]{color:#9aa39d;}

  /* ---- fixed-rhythm stack: every row below the donuts uses identical, unvarying spacing ---- */
  .donuts{display:flex;gap:16px;}
  .donutcell{width:76px;display:flex;flex-direction:column;align-items:center;}
  .donut{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;
    box-shadow:0 3px 8px rgba(20,90,110,0.18);}
  .donut .hole{width:52px;height:52px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;
    font-size:12.5px;font-weight:800;font-variant-numeric:tabular-nums;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.03);}
  .donut .hole [contenteditable]{min-width:16px;text-align:center;}

  .arrowrow{display:flex;gap:16px;margin-top:10px;}
  .arrow{width:76px;height:20px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;}
  .arrow.good{color:#0FBF9F;}
  .arrow.bad{color:var(--red);}

  .icons{display:flex;gap:16px;margin-top:8px;}
  .iconcell{width:76px;display:flex;align-items:center;justify-content:center;}
  .iconbadge{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 7px rgba(20,90,110,0.22);}
  .iconbadge svg{width:34px;height:34px;}

  /* label/value block: identical fixed offsets under every icon, everywhere */
  .metricblock{display:flex;gap:16px;margin-top:10px;}
  .metriccell{width:76px;display:flex;flex-direction:column;align-items:center;}
  .metriclabel{font-size:10.5px;font-weight:800;letter-spacing:.6px;color:#4b524e;height:14px;line-height:14px;white-space:nowrap;text-align:center;}
  .metricval{font-size:13px;font-weight:800;color:var(--ink);height:18px;line-height:18px;margin-top:4px;font-variant-numeric:tabular-nums;text-align:center;}
  .metricval [contenteditable]{display:inline-block;min-width:22px;text-align:center;}

  .wheelwrap{display:flex;align-items:center;justify-content:center;padding-top:30px;}
  .wheelwrap text{cursor:text;}
  .wheelwrap text:hover{fill-opacity:.75;}

  .details{font-size:11.5px;line-height:1.85;background:#f7f8f7;border:1px solid var(--card-border);border-radius:12px;
    padding:11px 16px;margin-top:18px;width:100%;max-width:320px;min-height:118px;}
  .details .dtitle{font-weight:800;color:var(--icon-ink);font-size:11.5px;letter-spacing:.3px;margin-bottom:2px;}
  .details .row{display:flex;flex-wrap:wrap;gap:3px 16px;}
  .details [contenteditable]{display:inline-block;min-width:15px;font-weight:800;color:var(--green);}

  @media (max-width:760px){
    .yearrow{grid-template-columns:1fr;}
    .wheelwrap{order:99;}
    .donuts,.arrowrow,.icons,.metricblock{justify-content:center;flex-wrap:wrap;}
  }
  @media print{
    html,body{background:#fff;padding:0;}
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .toolbar{display:none;}
    .sheet{box-shadow:none;border-radius:0;}
    [contenteditable]:hover{background:none;}
    .section{page-break-inside:avoid;padding:6px 16px 2px;}
    .section+.section{margin-top:0;}
    .section-title{font-size:14px;margin:2px 0 6px;}
    .yearrow{grid-template-columns:1fr auto 1fr;gap:6px;}
    .yearlabel{font-size:11px;margin-bottom:3px;}
    .wheelwrap{order:0;padding-top:2px;}
    .wheelwrap svg{width:86px;height:86px;}
    .donuts,.arrowrow,.icons,.metricblock{flex-wrap:nowrap;gap:8px;}
    .donutcell,.iconcell,.metriccell,.arrow{width:44px;}
    .donut{width:44px;height:44px;}
    .donut .hole{width:30px;height:30px;font-size:9px;}
    .arrowrow{margin-top:2px;}
    .arrow{height:12px;font-size:11px;}
    .icons{margin-top:2px;}
    .iconbadge{width:32px;height:32px;}
    .iconbadge svg{width:18px;height:18px;}
    .metricblock{margin-top:2px;}
    .metriclabel{font-size:8px;height:11px;line-height:11px;}
    .metricval{font-size:9.5px;height:13px;line-height:13px;margin-top:1px;}
    .details{font-size:8.5px;line-height:1.35;padding:4px 8px;margin-top:4px;min-height:0;}
    .details .dtitle{font-size:8.5px;margin-bottom:0;}
    .header{padding:4px 0 4px;min-height:0;}
    .brand{width:auto;margin-left:0;}
    .brand img{height:32px;margin-bottom:2px;}
    .brand-ar{font-size:14px;line-height:1.1;}
    .brand-en{font-size:8px;margin-top:0;}
    .brand-sub{font-size:9px;padding-top:2px;margin-top:2px;}
    .donut,.iconbadge,.section-title [contenteditable]{
      -webkit-print-color-adjust:exact !important;
      print-color-adjust:exact !important;
    }
  }
</style>
</head>

const ORIGINAL = {"sections": [{"name": "BLOOD BANK CENTER", "years": {"2024": {"metrics": {"WASTE": 37, "RHNEG": 119, "FEMALE": 51, "DONOR": 1297}, "waste": {"QNS": 16, "Airinfusion": 0, "Dammaged": 3, "Clotted": 11, "OverVolume": 7}, "rhoneg": 68}, "2025": {"metrics": {"WASTE": 49, "RHNEG": 179, "FEMALE": 52, "DONOR": 1191}, "waste": {"QNS": 18, "Airinfusion": 12, "Dammaged": 1, "Clotted": 17, "OverVolume": 1}, "rhoneg": 116}}}, {"name": "DAMY", "years": {"2024": {"metrics": {"WASTE": 24, "RHNEG": 56, "FEMALE": 28, "DONOR": 551}, "waste": {"QNS": 16, "Airinfusion": 1, "Dammaged": 0, "Clotted": 7, "OverVolume": 0}, "rhoneg": 20}, "2025": {"metrics": {"WASTE": 20, "RHNEG": 55, "FEMALE": 40, "DONOR": 560}, "waste": {"QNS": 10, "Airinfusion": 1, "Dammaged": 0, "Clotted": 7, "OverVolume": 0}, "rhoneg": 122}}}, {"name": "MOBILE", "years": {"2024": {"metrics": {"WASTE": 108, "RHNEG": 191, "FEMALE": 198, "DONOR": 2732}, "waste": {"QNS": 57, "Airinfusion": 1, "Dammaged": 0, "Clotted": 30, "OverVolume": 20}, "rhoneg": 99}, "2025": {"metrics": {"WASTE": 173, "RHNEG": 240, "FEMALE": 210, "DONOR": 2925}, "waste": {"QNS": 134, "Airinfusion": 0, "Dammaged": 1, "Clotted": 27, "OverVolume": 1}, "rhoneg": 29}}}]};
const STORE_KEY = "bloodbank_yoy_report_v3";

/* ---- refined, clearer flat icon set ---- */
const ICONS = {
  WASTE: `<svg viewBox="0 0 48 48"><path d="M14 15h20l-1.6 24.5a3 3 0 0 1-3 2.8H18.6a3 3 0 0 1-3-2.8L14 15z" fill="#fff" opacity=".92"/>
    <path d="M14 15h20l-1.6 24.5a3 3 0 0 1-3 2.8H18.6a3 3 0 0 1-3-2.8L14 15z" fill="none" stroke="#123a35" stroke-width="2.3" stroke-linejoin="round"/>
    <path d="M11.5 15h25" stroke="#123a35" stroke-width="2.3" stroke-linecap="round"/>
    <path d="M19 15l1.2-4.5h7.6L29 15" fill="none" stroke="#123a35" stroke-width="2.3" stroke-linejoin="round"/>
    <path d="M20 20.5l.9 15M24 20.5v15M28 20.5l-.9 15" stroke="#123a35" stroke-width="1.8" stroke-linecap="round"/></svg>`,
  RHNEG: `<svg viewBox="0 0 48 48"><path d="M24 8c-5.2 7-9 12.4-9 17.6a9 9 0 0 0 18 0C33 20.4 29.2 15 24 8z" fill="#fff" opacity=".92"/>
    <path d="M24 8c-5.2 7-9 12.4-9 17.6a9 9 0 0 0 18 0C33 20.4 29.2 15 24 8z" fill="none" stroke="#123a35" stroke-width="2.3" stroke-linejoin="round"/>
    <path d="M17.5 26.5c0 2.6 1.3 4.6 3.4 5.7" fill="none" stroke="#123a35" stroke-width="1.6" stroke-linecap="round" opacity=".6"/>
    <rect x="19" y="24.5" width="10" height="2.6" rx="1.3" fill="#123a35"/></svg>`,
  FEMALE: `<svg viewBox="0 0 48 48">
    <circle cx="24" cy="13.5" r="6.3" fill="#fff" opacity=".95" stroke="#123a35" stroke-width="2.3"/>
    <path d="M24 19.5l-8 15.5h5.2L20 42h8l-1.2-7h5.2z" fill="#fff" opacity=".95" stroke="#123a35" stroke-width="2.3" stroke-linejoin="round"/>
  </svg>`,
  DONOR: `<svg viewBox="0 0 48 48"><circle cx="16.5" cy="15" r="5.6" fill="#fff" opacity=".92"/><circle cx="16.5" cy="15" r="5.6" fill="none" stroke="#123a35" stroke-width="2.1"/>
    <circle cx="31.5" cy="15" r="5.6" fill="#fff" opacity=".92"/><circle cx="31.5" cy="15" r="5.6" fill="none" stroke="#123a35" stroke-width="2.1"/>
    <path d="M6 37c0-7.2 4.8-11.6 10.5-11.6S27 29.8 27 37" fill="#fff" opacity=".92" stroke="#123a35" stroke-width="2.1" stroke-linecap="round"/>
    <path d="M21 37c0-7.2 4.8-11.6 10.5-11.6S42 29.8 42 37" fill="none" stroke="#123a35" stroke-width="2.1" stroke-linecap="round"/></svg>`
};
const LABELS = {WASTE:"WASTE", RHNEG:"RH NEG", FEMALE:"FEMALE", DONOR:"DONOR"};
const COLORS = {WASTE:"waste", RHNEG:"rhneg", FEMALE:"female", DONOR:"donor"};
const METRIC_KEYS = ["WASTE","RHNEG","FEMALE","DONOR"];
const WHEEL_QUADS = [
  {key:"DONOR", start:-90, end:0, color:"#3E9FE0"},
  {key:"FEMALE", start:0, end:90, color:"#2FB4DE"},
  {key:"RHNEG", start:90, end:180, color:"#24C8D8"},
  {key:"WASTE", start:180, end:270, color:"#17DFCF"}
];
const WHEEL_DEFAULT_LABELS = {DONOR:"DONOR", FEMALE:"FEMALE", RHNEG:"RH NEG", WASTE:"WASTE"};

function num(v){ const n = parseFloat(String(v).replace(/[^\d.\-]/g,'')); return isNaN(n)?0:n; }

function loadData(){
  try{ const raw = localStorage.getItem(STORE_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  return JSON.parse(JSON.stringify(ORIGINAL));
}
let DATA = loadData();

function donutHTML(metric){
  return `<div class="donutcell"><div class="donut" data-metric="${metric}">
    <div class="hole"><span contenteditable="true" data-field="pct" data-metric="${metric}">0</span>%</div>
  </div></div>`;
}

function wasteTotal(w){ return num(w.QNS)+num(w.Airinfusion)+num(w.Dammaged)+num(w.Clotted)+num(w.OverVolume); }

function render(){
  const root = document.getElementById('sections');
  root.innerHTML = '';
  DATA.sections.forEach((sec, si)=>{
    const el = document.createElement('div');
    el.className = 'section';
    el.dataset.si = si;

    el.innerHTML = `
      <div class="section-title"><span contenteditable="true" data-field="secname">${sec.name}</span></div>
      <div class="yearrow">
        ${yearColHTML()}
        <div class="wheelwrap">${wheelSVG(sec)}</div>
        ${yearColHTML()}
      </div>
    `;
    root.appendChild(el);
  });

  attachListeners();
  recalcAll(false);
}

function yearColHTML(){
  return `
    <div class="yearcol">
      <div class="yearlabel" contenteditable="true" data-field="yearlabel">YEAR</div>
      <div class="donuts">${METRIC_KEYS.map(mk=>donutHTML(mk)).join('')}</div>
      <div class="arrowrow">${METRIC_KEYS.map(mk=>`<div class="arrow" data-metric="${mk}"></div>`).join('')}</div>
      <div class="icons">${METRIC_KEYS.map(mk=>`<div class="iconcell"><div class="iconbadge" data-metric="${mk}">${ICONS[mk]}</div></div>`).join('')}</div>
      <div class="metricblock">${METRIC_KEYS.map(mk=>`
        <div class="metriccell">
          <div class="metriclabel">${LABELS[mk]}</div>
          <div class="metricval"><span contenteditable="true" data-field="mval" data-metric="${mk}">0</span></div>
        </div>`).join('')}</div>
      <div class="details">
        <div class="dtitle">Waste Details</div>
        <div class="row">
          <span>1-QNS: <span contenteditable="true" data-field="w" data-k="QNS">0</span></span>
          <span>2-Airinfusion: <span contenteditable="true" data-field="w" data-k="Airinfusion">0</span></span>
          <span>3-Dammaged: <span contenteditable="true" data-field="w" data-k="Dammaged">0</span></span>
        </div>
        <div class="row">
          <span>4-Clotted: <span contenteditable="true" data-field="w" data-k="Clotted">0</span></span>
          <span>5-Over Volume: <span contenteditable="true" data-field="w" data-k="OverVolume">0</span></span>
        </div>
        <div class="dtitle" style="margin-top:6px;">RH Details</div>
        <div>O Negative: <span contenteditable="true" data-field="rhoneg">0</span></div>
      </div>
    </div>
  `;
}

function wheelSVG(sec){
  const R = 68, r = 44, cx=90, cy=90;
  const gap = 3.2;
  const labels = sec.wheelLabels || WHEEL_DEFAULT_LABELS;
  const qLabel = sec.quarter || 'Q1';

  function arcPath(startAngle,endAngle,radiusOuter,radiusInner){
    const toXY = (ang,rad)=>[cx+rad*Math.cos(ang*Math.PI/180), cy+rad*Math.sin(ang*Math.PI/180)];
    const [x1,y1]=toXY(startAngle,radiusOuter), [x2,y2]=toXY(endAngle,radiusOuter);
    const [x3,y3]=toXY(endAngle,radiusInner), [x4,y4]=toXY(startAngle,radiusInner);
    const large = (endAngle-startAngle)%360>180?1:0;
    return `M${x1},${y1} A${radiusOuter},${radiusOuter} 0 ${large} 1 ${x2},${y2} L${x3},${y3} A${radiusInner},${radiusInner} 0 ${large} 0 ${x4},${y4} Z`;
  }

  const paths = WHEEL_QUADS.map(q=>`<path d="${arcPath(q.start+gap/2,q.end-gap/2,R,r)}" fill="${q.color}"/>`).join('');

  // plain rotated <text> per quadrant — simple, reliable, always visible, still editable
  const midR = (R+r)/2;
  const texts = WHEEL_QUADS.map(q=>{
    const mid = (q.start+q.end)/2;
    const tx = cx + midR*Math.cos(mid*Math.PI/180);
    const ty = cy + midR*Math.sin(mid*Math.PI/180);
    const bottomHalf = mid > 0 && mid < 180; // normalized: 0..180 = lower half in SVG y-down coords
    const rot = bottomHalf ? mid - 90 : mid + 90;
    return `<text x="${tx}" y="${ty}" transform="rotate(${rot} ${tx} ${ty})" text-anchor="middle" dominant-baseline="middle"
      font-size="11.5" font-weight="800" fill="#fff" letter-spacing="1.2"
      contenteditable="true" data-wheel-label="${q.key}">${labels[q.key]}</text>`;
  }).join('');

  return `<svg width="180" height="180" viewBox="0 0 180 180" style="filter:drop-shadow(0 4px 10px rgba(20,90,110,0.25));">
    <circle cx="${cx}" cy="${cy}" r="${R+1}" fill="none" stroke="#eef2f1" stroke-width="2"/>
    ${paths}${texts}
    <circle cx="${cx}" cy="${cy}" r="${r-3}" fill="#fff" stroke="#f0f2f0" stroke-width="1"/>
    <text x="${cx}" y="${cy+8}" text-anchor="middle" font-size="22" font-weight="900" fill="#141a18" contenteditable="true" data-wheel-center="1">${qLabel}</text>
  </svg>`;
}

function attachListeners(){
  document.querySelectorAll('#sections [contenteditable]').forEach(elm=>{
    elm.addEventListener('blur', ()=>{ readDOMIntoData(); recalcAll(); persist(); });
    elm.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); elm.blur(); } });
  });
}

function readDOMIntoData(){
  document.querySelectorAll('.section').forEach(el=>{
    const si = +el.dataset.si;
    const sec = DATA.sections[si];
    sec.name = el.querySelector('[data-field="secname"]').textContent.trim();
    const cols = el.querySelectorAll('.yearcol');
    const oldKeys = Object.keys(sec.years);
    const newYears = {};
    cols.forEach((col, idx)=>{
      const yLabel = col.querySelector('[data-field="yearlabel"]').textContent.trim() || oldKeys[idx];
      const metrics = {};
      METRIC_KEYS.forEach(mk=>{
        const v = col.querySelector(`[data-field="mval"][data-metric="${mk}"]`).textContent;
        metrics[mk] = num(v);
      });
      const waste = {};
      col.querySelectorAll('[data-field="w"]').forEach(w=>{ waste[w.dataset.k] = num(w.textContent); });
      const rhoneg = num(col.querySelector('[data-field="rhoneg"]').textContent);
      newYears[yLabel] = {metrics, waste, rhoneg};
    });
    sec.years = newYears;

    const centerText = el.querySelector('[data-wheel-center]');
    if(centerText) sec.quarter = centerText.textContent.trim();
    const wheelLabels = {};
    el.querySelectorAll('[data-wheel-label]').forEach(t=>{ wheelLabels[t.dataset.wheelLabel] = t.textContent.trim(); });
    if(Object.keys(wheelLabels).length) sec.wheelLabels = wheelLabels;
  });
}

function recalcAll(doPersist=true){
  document.querySelectorAll('.section').forEach(el=>{
    const si = +el.dataset.si;
    const sec = DATA.sections[si];
    const yearKeys = Object.keys(sec.years);

    const donorTotals = {};
    yearKeys.forEach(yk=>{ donorTotals[yk] = 0; });
    DATA.sections.forEach(s2=>{
      yearKeys.forEach(yk=>{
        if(s2.years[yk]) donorTotals[yk] += num(s2.years[yk].metrics.DONOR);
      });
    });

    const cols = el.querySelectorAll('.yearcol');
    const pctByYear = {};

    yearKeys.forEach((yk, idx)=>{
      const yd = sec.years[yk];
      const col = cols[idx];
      col.querySelector('[data-field="yearlabel"]').textContent = yk;

      yd.metrics.WASTE = wasteTotal(yd.waste);

      const pct = {};
      ['WASTE','RHNEG','FEMALE'].forEach(mk=>{
        const donor = num(yd.metrics.DONOR);
        pct[mk] = donor>0 ? (num(yd.metrics[mk])/donor*100) : 0;
      });
      const totDonor = donorTotals[yk];
      pct.DONOR = totDonor>0 ? (num(yd.metrics.DONOR)/totDonor*100) : 0;
      pctByYear[yk] = pct;

      METRIC_KEYS.forEach(mk=>{
        const donutEl = col.querySelector(`.donut[data-metric="${mk}"]`);
        const pctSpan = donutEl.querySelector('[data-field="pct"]');
        const p = pct[mk];
        pctSpan.textContent = p>=10 ? p.toFixed(1).replace(/\.0$/,'') : p.toFixed(1);
        const cvar = COLORS[mk];
        donutEl.style.background = `conic-gradient(var(--${cvar}) 0% ${Math.min(p,100)}%, var(--${cvar}-track) ${Math.min(p,100)}% 100%)`;

        const valSpan = col.querySelector(`[data-field="mval"][data-metric="${mk}"]`);
        valSpan.textContent = num(yd.metrics[mk]);

        const badge = col.querySelector(`.iconbadge[data-metric="${mk}"]`);
        badge.style.background = `var(--${cvar})`;
      });

      Object.keys(yd.waste).forEach(k=>{
        const f = col.querySelector(`[data-field="w"][data-k="${k}"]`);
        if(f) f.textContent = num(yd.waste[k]);
      });
      col.querySelector('[data-field="rhoneg"]').textContent = num(yd.rhoneg);
    });

    if(yearKeys.length===2){
      const [y1,y2] = yearKeys;
      const col2 = cols[1];
      METRIC_KEYS.forEach(mk=>{
        const p1 = pctByYear[y1][mk], p2 = pctByYear[y2][mk];
        const up = p2 >= p1;
        const goodDirection = (mk === 'WASTE') ? !up : up;
        const arrow = col2.querySelector(`.arrow[data-metric="${mk}"]`);
        arrow.textContent = up ? '▲' : '▼';
        arrow.className = 'arrow ' + (goodDirection?'good':'bad');
      });
    }
  });

  if(doPersist) persist();
}

function persist(){ localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); }

function saveData(){ readDOMIntoData(); recalcAll(); persist(); flash('Saved ✓'); }
function resetData(){
  if(!confirm('Reset all values back to the original report? This discards your edits.')) return;
  DATA = JSON.parse(JSON.stringify(ORIGINAL));
  localStorage.removeItem(STORE_KEY);
  render();
  flash('Reset to original');
}
function flash(msg){
  const hint = document.querySelector('.toolbar .hint');
  const old = hint.textContent;
  hint.textContent = msg; hint.style.color = '#00754A';
  setTimeout(()=>{ hint.textContent = old; hint.style.color=''; }, 1400);
}

render();
</script>
